<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b4d3e" />
    <link rel="manifest" href="manifest.json" />
    <title>Varia Suit - Scan Visor</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link
      rel="icon"
      href="/icons/icon-192x192.png"
      type="image/png"
      sizes="192x192"
    />
    <link
      rel="icon"
      href="/icons/icon-512x512.png"
      type="image/png"
      sizes="512x512"
    />
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#607c86" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Samus Scan Visor" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hud hud--top hud--text-stroke">
        <div class="hud-content">
          <h1>Scan Visor</h1>
          <div class="small">Scan and add to grocery list</div>
        </div>
      </header>

      <div class="viewfinder" id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <div id="reticule" class="reticule" aria-hidden="true"></div>
      </div>

      <div class="hud hud--bottom">
        <div class="controls">
          <div class="controls__left">
            <button id="start">Start</button>
            <button id="stop" disabled>Stop</button>
          </div>
          <div class="messages hud--text-stroke">
            <div id="status">Idle</div>
            <div id="debug" class="small"></div>
          </div>
          <div class="controls__right">
            <button id="showProductsBtn" type="button">Stored products</button>
          </div>
        </div>

        <dialog id="storedProductsPanel" class="stored-products-panel">
          <div class="card-title-row">
            <h2>Stored products</h2>
            <button id="closeProductsBtn" class="close-btn" type="button">
              Close
            </button>
          </div>
          <div id="storedProducts" class="small">No products stored yet.</div>
        </dialog>
      </div>

      <div id="updateBanner" class="update-banner">
        <div>Update available. Reload to use the latest version.</div>
        <button id="reloadBtn">Reload</button>
      </div>

      <!-- <div class="card">
        <h2>Current product</h2>
        <div id="productInfo" class="small">No product scanned yet.</div>
      </div>

      <div class="card">
        <h2>Stored products</h2>
        <div id="storedProducts" class="small">No products stored yet.</div>
      </div> -->
    </div>

    <script
      type="text/javascript"
      src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"
    ></script>
    <script type="module" src="./js/sw-updater.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
