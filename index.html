<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b4d3e" />
    <link rel="manifest" href="manifest.json" />
    <title>Barcode Shortcut PWA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header>
        <div>
          <h1>Barcode Shortcut PWA</h1>
          <div class="small">Front camera scan + local product lookup</div>
        </div>
      </header>

      <div class="preview card">
        <div class="viewfinder" id="viewfinder">
          <video id="video" autoplay playsinline muted></video>
          <div id="reticule" class="reticule" aria-hidden="true"></div>
        </div>
      </div>

      <div class="controls">
        <button id="start">Start camera</button>
        <button id="stop" disabled>Stop camera</button>
        <button id="clear">Clear stored products</button>
      </div>

      <div id="status">Idle</div>
      <div id="debug" class="small"></div>

      <div id="updateBanner" class="update-banner">
        <div>Update available. Reload to use the latest version.</div>
        <button id="reloadBtn">Reload</button>
      </div>

      <div class="card">
        <h2>Current product</h2>
        <div id="productInfo" class="small">No product scanned yet.</div>
      </div>

      <div class="card">
        <h2>Stored products</h2>
        <div id="storedProducts" class="small">No products stored yet.</div>
      </div>
    </div>

    <script
      type="text/javascript"
      src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"
    ></script>
    <script type="module" src="./js/sw-updater.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
